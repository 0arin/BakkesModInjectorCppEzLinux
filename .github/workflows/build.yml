name: Build BakkesMod Injector

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '5.15.2'
        arch: 'win64_msvc2019_64'

    - name: Download QtMsBuild
      run: |
        $releases = Invoke-RestMethod "https://api.github.com/repos/qt-labs/vstools/releases/latest"
        $asset = $releases.assets | Where-Object { $_.name -like "*QtMsBuild*" }
        if ($asset) {
          Invoke-WebRequest $asset.browser_download_url -OutFile QtMsBuild.zip
          Expand-Archive QtMsBuild.zip -DestinationPath "BakkesModInjectorC++\QtMsBuild"
        } else {
          Write-Host "Assets found:"
          $releases.assets | ForEach-Object { Write-Host $_.name }
          # Fallback: clone and copy
          git clone --depth 1 https://github.com/qt-labs/vstools.git vstools_tmp
          Copy-Item -Recurse vstools_tmp\QtMsBuild "BakkesModInjectorC++\QtMsBuild"
        }

    - name: Download miniz
      run: |
        curl -L https://github.com/richgel999/miniz/archive/refs/heads/master.zip -o miniz.zip
        Expand-Archive miniz.zip -DestinationPath C:\Users\runneradmin\Downloads\

    - name: Find and build solution
      run: |
        $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
        $qtDir = "$env:QT_ROOT_DIR"
        Write-Host "Solution: $($sln.FullName)"
        Write-Host "QTDIR: $qtDir"
        Write-Host "QtMsBuild contents:"
        Get-ChildItem "BakkesModInjectorC++\QtMsBuild" -ErrorAction SilentlyContinue
        msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 /p:QTDIR="$qtDir"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BakkesMod
        path: |
          **/Release/BakkesMod.exe
