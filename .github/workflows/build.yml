name: Build BakkesMod Injector

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Find and build solution
      run: |
        $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
        Write-Host "Found solution: $($sln.FullName)"
        msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BakkesMod
        path: |
          x64/Release/BakkesMod.exe
          **/Release/BakkesMod.exe
