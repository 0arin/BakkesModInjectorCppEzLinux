name: Build BakkesMod Injector

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '5.15.2'
        arch: 'win64_msvc2019_64'

    - name: Install QtMsBuild via NuGet
      run: nuget install QtMsBuild -OutputDirectory QtMsBuild_pkg

    - name: Download miniz
      run: |
        curl -L https://github.com/richgel999/miniz/archive/refs/heads/master.zip -o miniz.zip
        Expand-Archive miniz.zip -DestinationPath C:\Users\runneradmin\Downloads\

    - name: Find and build solution
      run: |
        $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
        $qtDir = "$env:QT_ROOT_DIR"
        $qtMsBuild = Get-ChildItem -Path "QtMsBuild_pkg" -Recurse -Filter "qt.targets" | Select-Object -First 1
        $qtMsBuildDir = $qtMsBuild.DirectoryName
        Write-Host "Solution: $($sln.FullName)"
        Write-Host "QTDIR: $qtDir"
        Write-Host "QtMsBuild: $qtMsBuildDir"
        msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 /p:QTDIR="$qtDir" /p:QtMsBuild="$qtMsBuildDir"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BakkesMod
        path: |
          **/Release/BakkesMod.exe
