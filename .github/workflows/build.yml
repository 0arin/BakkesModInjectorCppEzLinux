name: Build BakkesMod Injector

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '5.15.2'
        arch: 'win64_msvc2019_64'

   - name: Install dependencies via vcpkg
      run: |
        vcpkg install curl[openssl]:x64-windows curlpp:x64-windows openssl:x64-windows --triplet x64-windows
        vcpkg integrate install

    - name: Download zip_file.hpp
      run: |
        curl -L "https://raw.githubusercontent.com/tfussell/miniz-cpp/master/zip_file.hpp" -o "BakkesModInjectorC++\zip_file.hpp"

    - name: Download QtMsBuild
      run: |
        git clone --depth 1 https://github.com/qt-labs/vstools.git vstools_tmp
        Copy-Item -Recurse vstools_tmp\QtMsBuild "BakkesModInjectorC++\QtMsBuild"

    - name: Download miniz
      run: |
        curl -L https://github.com/richgel999/miniz/archive/refs/heads/master.zip -o miniz.zip
        Expand-Archive miniz.zip -DestinationPath C:\Users\runneradmin\Downloads\

    - name: Find and build solution
      run: |
        $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
        $qtDir = "$env:QT_ROOT_DIR"
        $vcpkgIncludes = "C:\vcpkg\installed\x64-windows\include"
        $vcpkgLibs = "C:\vcpkg\installed\x64-windows\lib"
        Write-Host "Solution: $($sln.FullName)"
        msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 /p:QTDIR="$qtDir" /p:AdditionalIncludeDirectories="$vcpkgIncludes"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BakkesMod
        path: |
          **/Release/BakkesMod.exe
